<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="robots" content="noindex, nofollow">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Games</title>
<style>
  :root {
    --bg: #f7f8fa;
    --card: #ffffff;
    --text: #1a1a1a;
    --muted: #6b7280;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --border: #e5e7eb;
    --grid: #f1f5f9;
    --piece-shadow: rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 16px;
  }
  .wrap { max-width: 1100px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 32px; }
  h1 { margin: 0 0 6px; font-size: 28px; font-weight: 600; letter-spacing: -0.02em; }
  header p { margin: 0; color: var(--muted); font-size: 14px; }
  .tabs {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 24px;
  }
  .tab {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.15s;
  }
  .tab:hover { border-color: var(--accent); }
  .tab.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .game {
    display: none;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
  }
  .game.active { display: block; }
  .game-layout {
    display: flex;
    gap: 24px;
    justify-content: center;
    align-items: flex-start;
    flex-wrap: wrap;
  }
  canvas {
    background: var(--grid);
    border-radius: 8px;
    display: block;
  }
  .panel {
    min-width: 180px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .stat {
    background: var(--grid);
    padding: 12px 16px;
    border-radius: 8px;
  }
  .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-value { font-size: 24px; font-weight: 600; margin-top: 2px; }
  .btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 10px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: background 0.15s;
  }
  .btn:hover { background: var(--accent-hover); }
  .btn-secondary {
    background: white;
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: var(--grid); border-color: var(--accent); }
  .controls {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
  }
  .controls strong { color: var(--text); }
  .overlay {
    position: relative;
  }
  .game-over {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.92);
    border-radius: 8px;
    flex-direction: column;
    gap: 12px;
  }
  .game-over.show { display: flex; }
  .game-over h2 { margin: 0; font-size: 20px; }
  .game-over p { margin: 0; color: var(--muted); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Mini Games</h1>
    <p>Built as a Claude capability test</p>
  </header>

  <div class="tabs">
    <button class="tab active" data-game="tetris">Tetris</button>
    <button class="tab" data-game="snake">Snake</button>
  </div>

  <!-- TETRIS -->
  <section class="game active" id="tetris">
    <div class="game-layout">
      <div class="overlay">
        <canvas id="tetris-canvas" width="300" height="600"></canvas>
        <div class="game-over" id="tetris-over">
          <h2>Game Over</h2>
          <p id="tetris-final"></p>
          <button class="btn" onclick="Tetris.start()">Play Again</button>
        </div>
      </div>
      <div class="panel">
        <div class="stat">
          <div class="stat-label">Score</div>
          <div class="stat-value" id="tetris-score">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Lines</div>
          <div class="stat-value" id="tetris-lines">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Level</div>
          <div class="stat-value" id="tetris-level">1</div>
        </div>
        <button class="btn" onclick="Tetris.start()">New Game</button>
        <button class="btn btn-secondary" onclick="Tetris.togglePause()">Pause</button>
        <div class="controls">
          <strong>Controls</strong><br>
          Arrow Left / Right – move<br>
          Arrow Down – soft drop<br>
          Arrow Up – rotate<br>
          Space – hard drop<br>
          P – pause
        </div>
      </div>
    </div>
  </section>

  <!-- SNAKE -->
  <section class="game" id="snake">
    <div class="game-layout">
      <div class="overlay">
        <canvas id="snake-canvas" width="500" height="500"></canvas>
        <div class="game-over" id="snake-over">
          <h2>Game Over</h2>
          <p id="snake-final"></p>
          <button class="btn" onclick="Snake.start()">Play Again</button>
        </div>
      </div>
      <div class="panel">
        <div class="stat">
          <div class="stat-label">Score</div>
          <div class="stat-value" id="snake-score">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Length</div>
          <div class="stat-value" id="snake-length">3</div>
        </div>
        <button class="btn" onclick="Snake.start()">New Game</button>
        <button class="btn btn-secondary" onclick="Snake.togglePause()">Pause</button>
        <div class="controls">
          <strong>Controls</strong><br>
          Arrow Keys – move<br>
          P – pause
        </div>
      </div>
    </div>
  </section>
</div>

<script>
// Tab switching
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    const target = tab.dataset.game;
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t === tab));
    document.querySelectorAll('.game').forEach(g => g.classList.toggle('active', g.id === target));
  });
});

// ============== TETRIS ==============
const Tetris = (() => {
  const canvas = document.getElementById('tetris-canvas');
  const ctx = canvas.getContext('2d');
  const COLS = 10, ROWS = 20, BLOCK = 30;
  const COLORS = {
    I: '#06b6d4', O: '#eab308', T: '#a855f7', S: '#22c55e',
    Z: '#ef4444', J: '#3b82f6', L: '#f97316'
  };
  const SHAPES = {
    I: [[1,1,1,1]],
    O: [[1,1],[1,1]],
    T: [[0,1,0],[1,1,1]],
    S: [[0,1,1],[1,1,0]],
    Z: [[1,1,0],[0,1,1]],
    J: [[1,0,0],[1,1,1]],
    L: [[0,0,1],[1,1,1]]
  };
  let grid, current, pos, score, lines, level, dropTimer, dropInterval, gameLoop, paused, alive;

  function newPiece() {
    const keys = Object.keys(SHAPES);
    const k = keys[Math.floor(Math.random() * keys.length)];
    return { shape: SHAPES[k].map(r => r.slice()), color: COLORS[k] };
  }

  function reset() {
    grid = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
    current = newPiece();
    pos = { x: Math.floor((COLS - current.shape[0].length) / 2), y: 0 };
    score = 0; lines = 0; level = 1;
    dropInterval = 800;
    paused = false; alive = true;
    document.getElementById('tetris-over').classList.remove('show');
    updateStats();
  }

  function collide(shape, px, py) {
    for (let y = 0; y < shape.length; y++) {
      for (let x = 0; x < shape[y].length; x++) {
        if (!shape[y][x]) continue;
        const nx = px + x, ny = py + y;
        if (nx < 0 || nx >= COLS || ny >= ROWS) return true;
        if (ny >= 0 && grid[ny][nx]) return true;
      }
    }
    return false;
  }

  function merge() {
    current.shape.forEach((row, y) => row.forEach((v, x) => {
      if (v && pos.y + y >= 0) grid[pos.y + y][pos.x + x] = current.color;
    }));
  }

  function clearLines() {
    let cleared = 0;
    for (let y = ROWS - 1; y >= 0; y--) {
      if (grid[y].every(c => c)) {
        grid.splice(y, 1);
        grid.unshift(Array(COLS).fill(null));
        cleared++;
        y++;
      }
    }
    if (cleared) {
      const points = [0, 100, 300, 500, 800][cleared] * level;
      score += points;
      lines += cleared;
      level = Math.floor(lines / 10) + 1;
      dropInterval = Math.max(100, 800 - (level - 1) * 70);
      updateStats();
    }
  }

  function rotate(shape) {
    const rows = shape.length, cols = shape[0].length;
    const out = Array.from({ length: cols }, () => Array(rows).fill(0));
    for (let y = 0; y < rows; y++) for (let x = 0; x < cols; x++) out[x][rows - 1 - y] = shape[y][x];
    return out;
  }

  function spawn() {
    current = newPiece();
    pos = { x: Math.floor((COLS - current.shape[0].length) / 2), y: 0 };
    if (collide(current.shape, pos.x, pos.y)) gameOver();
  }

  function drop() {
    if (!collide(current.shape, pos.x, pos.y + 1)) {
      pos.y++;
    } else {
      merge();
      clearLines();
      spawn();
    }
  }

  function hardDrop() {
    while (!collide(current.shape, pos.x, pos.y + 1)) { pos.y++; score += 2; }
    merge(); clearLines(); spawn(); updateStats();
  }

  function move(dx) {
    if (!collide(current.shape, pos.x + dx, pos.y)) pos.x += dx;
  }

  function tryRotate() {
    const r = rotate(current.shape);
    if (!collide(r, pos.x, pos.y)) current.shape = r;
    else if (!collide(r, pos.x - 1, pos.y)) { current.shape = r; pos.x--; }
    else if (!collide(r, pos.x + 1, pos.y)) { current.shape = r; pos.x++; }
  }

  function draw() {
    ctx.fillStyle = '#f1f5f9';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    // grid lines
    ctx.strokeStyle = '#e2e8f0';
    ctx.lineWidth = 1;
    for (let x = 0; x <= COLS; x++) {
      ctx.beginPath(); ctx.moveTo(x * BLOCK, 0); ctx.lineTo(x * BLOCK, ROWS * BLOCK); ctx.stroke();
    }
    for (let y = 0; y <= ROWS; y++) {
      ctx.beginPath(); ctx.moveTo(0, y * BLOCK); ctx.lineTo(COLS * BLOCK, y * BLOCK); ctx.stroke();
    }
    // settled blocks
    for (let y = 0; y < ROWS; y++) {
      for (let x = 0; x < COLS; x++) {
        if (grid[y][x]) drawBlock(x, y, grid[y][x]);
      }
    }
    // current
    if (current) {
      current.shape.forEach((row, y) => row.forEach((v, x) => {
        if (v) drawBlock(pos.x + x, pos.y + y, current.color);
      }));
    }
  }

  function drawBlock(x, y, color) {
    ctx.fillStyle = color;
    ctx.fillRect(x * BLOCK + 1, y * BLOCK + 1, BLOCK - 2, BLOCK - 2);
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fillRect(x * BLOCK + 1, y * BLOCK + 1, BLOCK - 2, 4);
  }

  function updateStats() {
    document.getElementById('tetris-score').textContent = score;
    document.getElementById('tetris-lines').textContent = lines;
    document.getElementById('tetris-level').textContent = level;
  }

  function loop(time) {
    if (!alive) return;
    if (!paused) {
      if (!dropTimer) dropTimer = time;
      if (time - dropTimer > dropInterval) {
        drop();
        dropTimer = time;
      }
      draw();
    }
    gameLoop = requestAnimationFrame(loop);
  }

  function gameOver() {
    alive = false;
    document.getElementById('tetris-final').textContent = `Score: ${score} – Lines: ${lines}`;
    document.getElementById('tetris-over').classList.add('show');
  }

  function start() {
    if (gameLoop) cancelAnimationFrame(gameLoop);
    reset();
    dropTimer = 0;
    gameLoop = requestAnimationFrame(loop);
  }

  function togglePause() { if (alive) paused = !paused; }

  document.addEventListener('keydown', e => {
    if (!document.getElementById('tetris').classList.contains('active') || !alive) return;
    if (e.key === 'p' || e.key === 'P') { togglePause(); return; }
    if (paused) return;
    switch (e.key) {
      case 'ArrowLeft': move(-1); break;
      case 'ArrowRight': move(1); break;
      case 'ArrowDown': drop(); score += 1; updateStats(); break;
      case 'ArrowUp': tryRotate(); break;
      case ' ': e.preventDefault(); hardDrop(); break;
    }
  });

  return { start, togglePause };
})();

// ============== SNAKE ==============
const Snake = (() => {
  const canvas = document.getElementById('snake-canvas');
  const ctx = canvas.getContext('2d');
  const SIZE = 25, COLS = 20, ROWS = 20;
  let snake, dir, nextDir, food, score, alive, paused, loopId, lastTick;
  const TICK = 110;

  function reset() {
    snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
    dir = { x: 1, y: 0 };
    nextDir = dir;
    placeFood();
    score = 0; alive = true; paused = false;
    document.getElementById('snake-over').classList.remove('show');
    updateStats();
  }

  function placeFood() {
    while (true) {
      const f = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
      if (!snake.some(s => s.x === f.x && s.y === f.y)) { food = f; return; }
    }
  }

  function step() {
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return gameOver();
    if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();
    snake.unshift(head);
    if (head.x === food.x && head.y === food.y) {
      score += 10;
      placeFood();
      updateStats();
    } else {
      snake.pop();
    }
  }

  function draw() {
    ctx.fillStyle = '#f1f5f9';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    // food
    ctx.fillStyle = '#ef4444';
    ctx.beginPath();
    ctx.arc(food.x * SIZE + SIZE / 2, food.y * SIZE + SIZE / 2, SIZE / 2 - 3, 0, Math.PI * 2);
    ctx.fill();
    // snake
    snake.forEach((s, i) => {
      ctx.fillStyle = i === 0 ? '#1d4ed8' : '#2563eb';
      ctx.fillRect(s.x * SIZE + 1, s.y * SIZE + 1, SIZE - 2, SIZE - 2);
    });
  }

  function updateStats() {
    document.getElementById('snake-score').textContent = score;
    document.getElementById('snake-length').textContent = snake.length;
  }

  function loop(time) {
    if (!alive) return;
    if (!paused) {
      if (!lastTick) lastTick = time;
      if (time - lastTick >= TICK) {
        step();
        lastTick = time;
      }
      if (alive) draw();
    }
    loopId = requestAnimationFrame(loop);
  }

  function gameOver() {
    alive = false;
    document.getElementById('snake-final').textContent = `Score: ${score} – Length: ${snake.length}`;
    document.getElementById('snake-over').classList.add('show');
  }

  function start() {
    if (loopId) cancelAnimationFrame(loopId);
    reset();
    lastTick = 0;
    loopId = requestAnimationFrame(loop);
  }

  function togglePause() { if (alive) paused = !paused; }

  document.addEventListener('keydown', e => {
    if (!document.getElementById('snake').classList.contains('active') || !alive) return;
    if (e.key === 'p' || e.key === 'P') { togglePause(); return; }
    if (paused) return;
    const k = e.key;
    if (k === 'ArrowUp' && dir.y !== 1) nextDir = { x: 0, y: -1 };
    else if (k === 'ArrowDown' && dir.y !== -1) nextDir = { x: 0, y: 1 };
    else if (k === 'ArrowLeft' && dir.x !== 1) nextDir = { x: -1, y: 0 };
    else if (k === 'ArrowRight' && dir.x !== -1) nextDir = { x: 1, y: 0 };
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(k)) e.preventDefault();
  });

  return { start, togglePause };
})();

// Auto-start
Tetris.start();
Snake.start();
</script>
</body>
</html>
