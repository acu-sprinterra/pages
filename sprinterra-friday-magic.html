<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="robots" content="noindex, nofollow">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprinterra Friday Magic</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800;900&family=Rubik:wght@300;400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0b1a;
    overflow: hidden;
    font-family: 'Rubik', sans-serif;
  }

  .scene {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Deep Sprinterra navy/cosmic background */
  .scene::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 55% at 25% 75%, rgba(25, 39, 125, 0.5) 0%, transparent 60%),
      radial-gradient(ellipse 55% 45% at 80% 25%, rgba(56, 170, 241, 0.2) 0%, transparent 50%),
      radial-gradient(ellipse 40% 35% at 60% 80%, rgba(25, 185, 41, 0.15) 0%, transparent 50%),
      radial-gradient(ellipse 90% 80% at 50% 50%, #19277D 0%, #0a0b1a 100%);
  }

  /* Animated gradient mesh overlay */
  .mesh {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 20% 30%, rgba(56, 170, 241, 0.08) 0%, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(25, 185, 41, 0.06) 0%, transparent 40%);
    animation: meshShift 12s ease-in-out infinite alternate;
  }

  @keyframes meshShift {
    0% { transform: scale(1) translate(0, 0); }
    100% { transform: scale(1.1) translate(-2%, 3%); }
  }

  /* Stars */
  .stars { position: absolute; inset: 0; }
  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: #fff;
    border-radius: 50%;
    animation: twinkle var(--dur) ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    0% { opacity: 0.1; transform: scale(1); }
    100% { opacity: 0.9; transform: scale(1.5); }
  }

  /* Logo container */
  .logo-wrap {
    position: absolute;
    top: 32px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    animation: fadeDown 1s 0.2s ease-out both;
  }
  .logo-wrap img {
    height: 36px;
    filter: brightness(10);
  }
  @keyframes fadeDown {
    0% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
    100% { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* Central content */
  .content {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 0 24px;
  }

  .eyebrow {
    font-family: 'Rubik', sans-serif;
    font-weight: 600;
    font-size: clamp(1rem, 2.5vw, 1.6rem);
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(56, 170, 241, 0.8);
    margin-bottom: 12px;
    animation: fadeUp 1s 0.4s ease-out both;
  }

  .title {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: clamp(5rem, 16vw, 12rem);
    line-height: 0.92;
    background: linear-gradient(
      135deg,
      #38AAF1 0%,
      #fff 30%,
      #19B929 55%,
      #38AAF1 80%,
      #fff 100%
    );
    background-size: 300% 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 5s ease-in-out infinite, fadeUp 1s 0.6s ease-out both;
    filter: drop-shadow(0 0 40px rgba(56, 170, 241, 0.35));
  }
  .title span {
    display: block;
    font-weight: 800;
    font-size: 0.48em;
    letter-spacing: 0.05em;
    background: linear-gradient(90deg, #38AAF1, #19B929);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-top: 0.15em;
  }

  @keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  @keyframes fadeUp {
    0% { opacity: 0; transform: translateY(30px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .tagline {
    font-family: 'Rubik', sans-serif;
    font-weight: 300;
    font-size: clamp(1.1rem, 2.8vw, 1.7rem);
    color: rgba(240, 241, 249, 0.5);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-top: 28px;
    animation: fadeUp 1s 1s ease-out both;
  }

  /* Win cards floating around */
  .win-card {
    position: absolute;
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(56, 170, 241, 0.15);
    border-radius: 12px;
    padding: 14px 20px;
    color: rgba(240, 241, 249, 0.7);
    font-size: 0.82rem;
    font-weight: 400;
    white-space: nowrap;
    animation: cardFloat var(--dur) ease-in-out infinite alternate, fadeIn 1.5s var(--delay) ease-out both;
    z-index: 5;
    pointer-events: none;
  }
  .win-card .icon {
    margin-right: 8px;
    font-size: 1.1em;
  }
  .win-card .highlight {
    color: #19B929;
    font-weight: 600;
  }
  .win-card .highlight-blue {
    color: #38AAF1;
    font-weight: 600;
  }

  @keyframes cardFloat {
    0% { transform: translateY(0px) rotate(var(--r1)); }
    100% { transform: translateY(var(--dy)) rotate(var(--r2)); }
  }
  @keyframes fadeIn {
    0% { opacity: 0; transform: translateY(20px) scale(0.95); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Celebration particles */
  .confetti {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 2px;
    animation: confettiFall var(--dur) linear infinite;
    opacity: 0;
  }
  @keyframes confettiFall {
    0% { opacity: 0; transform: translateY(-20vh) rotate(0deg); }
    10% { opacity: 0.8; }
    90% { opacity: 0.6; }
    100% { opacity: 0; transform: translateY(110vh) rotate(720deg); }
  }

  /* Sparkles */
  .sparkle {
    position: absolute;
    width: 4px; height: 4px;
    border-radius: 50%;
    animation: sparkleAnim var(--dur) ease-in-out infinite;
  }
  @keyframes sparkleAnim {
    0%, 100% { opacity: 0; transform: scale(0); }
    50% { opacity: 1; transform: scale(1.8); }
  }

  /* Energy rings */
  .ring {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    border: 1px solid;
    animation: ringPulse var(--dur) ease-out infinite;
    pointer-events: none;
  }
  @keyframes ringPulse {
    0% { width: 80px; height: 80px; opacity: 0.5; }
    100% { width: var(--size); height: var(--size); opacity: 0; }
  }

  /* Bottom gradient bar — Sprinterra signature */
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #19277D, #38AAF1, #19B929);
    z-index: 20;
  }

  /* Top accent line */
  .top-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, #19B929, #38AAF1, #19277D);
    z-index: 20;
  }
</style>
</head>

<script>
  // Stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.setProperty('--dur', (1.5 + Math.random() * 3) + 's');
    star.style.animationDelay = (Math.random() * 3) + 's';
    star.style.width = star.style.height = (1 + Math.random() * 2) + 'px';
    starsEl.appendChild(star);
  }

  // Confetti in Sprinterra brand colors
  const confettiEl = document.getElementById('confetti');
  const brandColors = ['#19277D', '#38AAF1', '#19B929', '#0159C2', '#28A9A2', '#0189E8'];
  for (let i = 0; i < 30; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = (5 + Math.random() * 90) + '%';
    c.style.background = brandColors[Math.floor(Math.random() * brandColors.length)];
    c.style.setProperty('--dur', (4 + Math.random() * 6) + 's');
    c.style.animationDelay = (Math.random() * 8) + 's';
    c.style.width = (4 + Math.random() * 8) + 'px';
    c.style.height = (4 + Math.random() * 8) + 'px';
    c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    confettiEl.appendChild(c);
  }

  // Sparkles
  const sparklesEl = document.getElementById('sparkles');
  for (let i = 0; i < 16; i++) {
    const sp = document.createElement('div');
    sp.className = 'sparkle';
    sp.style.left = (30 + (Math.random() - 0.5) * 40) + '%';
    sp.style.top = (45 + (Math.random() - 0.5) * 25) + '%';
    sp.style.setProperty('--dur', (2 + Math.random() * 3) + 's');
    sp.style.animationDelay = (Math.random() * 4) + 's';
    sp.style.background = brandColors[Math.floor(Math.random() * brandColors.length)];
    sp.style.boxShadow = `0 0 8px ${sp.style.background}`;
    sparklesEl.appendChild(sp);
  }

  // Pulsing energy rings
  const ringsEl = document.getElementById('rings');
  for (let i = 0; i < 3; i++) {
    const ring = document.createElement('div');
    ring.className = 'ring';
    ring.style.borderColor = i === 0 ? 'rgba(56,170,241,0.3)' : i === 1 ? 'rgba(25,185,41,0.2)' : 'rgba(25,39,125,0.25)';
    ring.style.setProperty('--dur', (3 + i * 1.5) + 's');
    ring.style.setProperty('--size', (400 + i * 200) + 'px');
    ring.style.animationDelay = (i * 1.2) + 's';
    ringsEl.appendChild(ring);
  }
</script>

</body>
</html>
