const DAYS = [
  { key: 'wed', label: 'Wednesday', subtitle: 'Day 1' },
  { key: 'thu', label: 'Thursday', subtitle: 'Day 2' },
  { key: 'fri', label: 'Friday', subtitle: 'Day 3' }
];

// ============================================================
// STATE
// ============================================================
let state = {
  player: null,
  currentDay: 'wed',
  view: 'loading', // loading | onboarding | rules | playing | summary | leaderboard
  answers: {}, // { dayKey: { qId: { selected, correct, points } } }
  daySummary: null
};

// ============================================================
// STORAGE: JSONBin-backed shared leaderboard + localStorage for personal
// ============================================================
const JSONBIN_KEY = '$2a$10$.CeMipZKiYEZ9WLKUhNw1OW6J4yKDMA/gnzSViKvHR.sP67AyTFju';
const JSONBIN_ID = '69f258c136566621a8081fd6';
const JSONBIN_URL = 'https://api.jsonbin.io/v3/b/' + JSONBIN_ID;

// In-memory cache of the bin contents to avoid repeated reads.
let _binCache = null;

async function readBin() {
  try {
    const r = await fetch(JSONBIN_URL + '/latest', {
      method: 'GET',
      headers: {
        'X-Master-Key': JSONBIN_KEY,
        'X-Bin-Meta': 'false'
      }
    });
    if (!r.ok) {
      console.error('[jsonbin] read failed:', r.status);
      return null;
    }
    const data = await r.json();
    // JSONBin v3 returns either the raw record (X-Bin-Meta:false) or { record: ... }
    const record = data && data.record ? data.record : data;
    _binCache = record || { players: [] };
    return _binCache;
  } catch (err) {
    console.error('[jsonbin] read error:', err);
    return null;
  }
}

async function writeBin(record) {
  try {
    const r = await fetch(JSONBIN_URL, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': JSONBIN_KEY
      },
      body: JSON.stringify(record)
    });
    if (!r.ok) {
      console.error('[jsonbin] write failed:', r.status);
      return false;
    }
    _binCache = record;
    return true;
  } catch (err) {
    console.error('[jsonbin] write error:', err);
    return false;
  }
}

// Push a player's score for a specific day to the shared bin.
// Bin shape: { players: [ { name, slug, wed, thu, fri, completedAt: { wed, thu, fri } } ] }
async function publishScoreToBin(playerName, dayKey, score, completedAt) {
  const bin = await readBin();
  if (!bin) return false;
  const record = bin.players ? bin : { players: [] };
  const slug = slugify(playerName);
  let p = record.players.find(x => x.slug === slug);
  if (!p) {
    p = { name: playerName, slug, wed: null, thu: null, fri: null, completedAt: {} };
    record.players.push(p);
  }
  p.name = playerName; // keep latest casing
  p[dayKey] = score;
  p.completedAt = p.completedAt || {};
  p.completedAt[dayKey] = completedAt;
  return await writeBin(record);
}

async function registerPlayerInBin(playerName) {
  const bin = await readBin();
  if (!bin) return false;
  const record = bin.players ? bin : { players: [] };
  const slug = slugify(playerName);
  let p = record.players.find(x => x.slug === slug);
  if (!p) {
    p = { name: playerName, slug, wed: null, thu: null, fri: null, completedAt: {} };
    record.players.push(p);
    return await writeBin(record);
  }
  // already registered - keep latest casing if it changed
  if (p.name !== playerName) {
    p.name = playerName;
    return await writeBin(record);
  }
  return true;
}

// LocalStorage helpers for personal data (player name + own answers).
function lsGet(key) {
  try { return localStorage.getItem(key); } catch { return null; }
}
function lsSet(key, value) {
  try { localStorage.setItem(key, value); return true; } catch { return false; }
}

// ============================================================
// PLAYER + ANSWERS
// ============================================================
async function loadPlayer() {
  const name = lsGet('player:name');
  if (name) {
    state.player = name;
    return true;
  }
  return false;
}

async function savePlayer(name) {
  state.player = name;
  lsSet('player:name', name);
  await registerPlayerInBin(name);
}

async function loadMyAnswers() {
  const wed = lsGet('answers:wed');
  const thu = lsGet('answers:thu');
  const fri = lsGet('answers:fri');
  state.answers = {
    wed: wed ? JSON.parse(wed) : null,
    thu: thu ? JSON.parse(thu) : null,
    fri: fri ? JSON.parse(fri) : null
  };
}

async function saveMyDayAnswers(dayKey, answers, score, breakdown) {
  const completedAt = Date.now();
  const payload = { answers, score, breakdown, completedAt };
  state.answers[dayKey] = payload;
  lsSet('answers:' + dayKey, JSON.stringify(payload));
  await publishScoreToBin(state.player, dayKey, score, completedAt);
}

function slugify(s) {
  return (s || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || 'anon';
}

// ============================================================
// LEADERBOARD
// ============================================================
async function resyncMyScores() {
  if (!state.player) return { synced: 0, errors: [] };
  await registerPlayerInBin(state.player);

  let synced = 0;
  const errors = [];

  for (const day of ['wed', 'thu', 'fri']) {
    const a = state.answers[day];
    if (!a) continue;
    const ok = await publishScoreToBin(state.player, day, a.score, a.completedAt);
    if (ok) synced++;
    else errors.push(day);
  }
  return { synced, errors };
}

async function fetchLeaderboard() {
  const bin = await readBin();
  if (!bin || !bin.players) return [];
  const list = bin.players.map(p => ({
    name: p.name,
    wed: (p.wed === undefined ? null : p.wed),
    thu: (p.thu === undefined ? null : p.thu),
    fri: (p.fri === undefined ? null : p.fri),
    total: (p.wed || 0) + (p.thu || 0) + (p.fri || 0)
  }));
  list.sort((a, b) => b.total - a.total);
  return list;
}

  if (state.view === 'summary') return renderSummary();
  if (state.view === 'leaderboard') return renderLeaderboard();

      <p>Five Sprinterra leaders. Three days. One leaderboard.</p>
      <p>Type your name to get started. You'll see it on the leaderboard.</p>
      <input id="nameInput" class="name-input" type="text" placeholder="Your name" maxlength="40" />
      <button id="startBtn">Continue</button>
    </div>
  `;
  const input = document.getElementById('nameInput');
  input.focus();
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('startBtn').click();

  document.getElementById('startBtn').addEventListener('click', async () => {
    const name = input.value.trim();

      input.focus();
      return;
    }
    await savePlayer(name);
    state.view = 'rules';
    render();
  });
}

function renderRules() {
  app.innerHTML = `
    <div class="card">
      <h2>How it works</h2>
      <p><strong>Welcome, ${escapeHtml(state.player)}.</strong></p>

      <h3>Cadence</h3>
      <p>This game runs for three days: <strong>Wednesday, Thursday, and Friday this week.</strong> Five questions per day. Play each day's questions whenever it suits you. Once you finish a day, you can't replay it.</p>

      <h3>Scoring</h3>
      <ul>
        <li>Most questions are worth 10 or 15 points.</li>
        <li>Friday closes with one <strong style="color: #8B6914;">⭐ Friday Magic</strong> question worth 30 points.</li>
        <li>Wrong answers cost nothing. There's no time pressure.</li>
      </ul>

      <h3>Topics</h3>
      <p>Each day mixes questions across services, engagement models, rates, ICP, customer reality, ISV business, AI agents, and recent brainstorming decisions. Things you'd expect leadership to know.</p>

      <h3>Leaderboard</h3>
      <p>Live across all five players. Refresh anytime to see where you stand.</p>

      <h3>Stakes</h3>
      <p>Bragging rights. That's it.</p>

      <button id="goBtn">Start playing</button>
      <button id="lbBtn" class="secondary" style="margin-left: 8px;">View leaderboard</button>
    </div>
  `;
  document.getElementById('goBtn').addEventListener('click', () => {
    state.view = 'playing';
    state.currentDay = pickDefaultDay();
    render();
  });
  document.getElementById('lbBtn').addEventListener('click', () => {
    state.view = 'leaderboard';
    render();
  });
}

function pickDefaultDay() {
  // pick first incomplete day
  for (const d of ['wed', 'thu', 'fri']) {
    if (!state.answers[d]) return d;
  }
  return 'fri';
}

function renderPlaying() {
  const dayKey = state.currentDay;
  const dayQuestions = QUESTIONS[dayKey];
  const completed = !!state.answers[dayKey];

  const tabs = DAYS.map(d => {
    const isActive = d.key === dayKey;
    const isDone = !!state.answers[d.key];
    return `<div class="day-tab ${isActive ? 'active' : ''} ${isDone ? 'completed' : ''}" data-day="${d.key}">${d.label}<br><span style="font-weight:400;font-size:12px;opacity:0.8">${d.subtitle}</span></div>`;
  }).join('');

  if (completed) {
    const a = state.answers[dayKey];
    app.innerHTML = `
      <div class="day-tabs">${tabs}</div>
      <div class="day-summary">
        <h2>${dayLabel(dayKey)} - already played</h2>
        <div class="score-big">${a.score}</div>
        <div class="score-detail">points scored on ${dayKey === 'wed' ? 'Wednesday' : dayKey === 'thu' ? 'Thursday' : 'Friday'}</div>
        <button id="lbBtn">View leaderboard</button>
        <button id="reviewBtn" class="secondary" style="margin-left: 8px;">Review answers</button>
      </div>
    `;
    attachTabHandlers();
    document.getElementById('lbBtn').addEventListener('click', () => {
      state.view = 'leaderboard';
      render();
    });
    document.getElementById('reviewBtn').addEventListener('click', () => {
      renderReview(dayKey);
    });
    return;
  }

  // playing fresh
  const questionsHtml = dayQuestions.map((q, idx) => renderQuestionCard(q, idx)).join('');
  app.innerHTML = `
    <div class="day-tabs">${tabs}</div>
    <div>${questionsHtml}</div>
    <div class="card">
      <div class="submit-row">
        <div class="progress-text" id="progressText">0 of ${dayQuestions.length} answered</div>
        <button id="submitBtn" disabled>Submit answers</button>
      </div>
    </div>
  `;

  attachTabHandlers();
  attachQuestionHandlers(dayKey);

  document.getElementById('submitBtn').addEventListener('click', () => submitDay(dayKey));
}

function renderQuestionCard(q, idx) {
  const isFM = !!q.fridayMagic;
  const optionsHtml = q.options.map((o, i) => `
    <button class="option" data-q="${q.id}" data-opt="${i}">
      <span class="option-letter">${String.fromCharCode(65 + i)})</span>${escapeHtml(o)}
    </button>
  `).join('');
  return `
    <div class="question-card ${isFM ? 'friday-magic' : ''}" id="card-${q.id}">
      ${isFM ? '<div class="friday-magic-banner">⭐ FRIDAY MAGIC ⭐</div>' : ''}
      <div class="question-meta">
        <span>Question ${idx + 1} · ${escapeHtml(q.category)}</span>
        <span class="points-badge">${q.points} pts</span>
      </div>
      <div class="question-text">${escapeHtml(q.text)}</div>
      <div class="options">${optionsHtml}</div>
      <div class="explanation" id="exp-${q.id}"></div>
    </div>
  `;
}

let pendingAnswers = {};

function attachQuestionHandlers(dayKey) {
  pendingAnswers = {};
  document.querySelectorAll('.option').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const qId = btn.dataset.q;
      const optIdx = parseInt(btn.dataset.opt, 10);
      // clear siblings
      document.querySelectorAll(`.option[data-q="${qId}"]`).forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      pendingAnswers[qId] = optIdx;
      updateSubmitState(dayKey);
    });
  });
}

function updateSubmitState(dayKey) {
  const total = QUESTIONS[dayKey].length;
  const answered = Object.keys(pendingAnswers).length;
  document.getElementById('progressText').textContent = `${answered} of ${total} answered`;
  const btn = document.getElementById('submitBtn');
  btn.disabled = answered < total;
}

async function submitDay(dayKey) {
  const dayQuestions = QUESTIONS[dayKey];
  let score = 0;
  const breakdown = [];

  // disable all options and reveal correctness
  dayQuestions.forEach(q => {
    const selected = pendingAnswers[q.id];
    const correct = selected === q.correct;
    const earned = correct ? q.points : 0;
    score += earned;
    breakdown.push({ qId: q.id, selected, correct, points: earned });

    document.querySelectorAll(`.option[data-q="${q.id}"]`).forEach(btn => {
      btn.classList.add('disabled');
      const optIdx = parseInt(btn.dataset.opt, 10);
      btn.classList.remove('selected');
      if (optIdx === q.correct) btn.classList.add('correct');
      else if (optIdx === selected) btn.classList.add('incorrect');
    });
    const exp = document.getElementById('exp-' + q.id);
    exp.innerHTML = `<strong>${correct ? 'Correct.' : 'Not quite.'}</strong> ${escapeHtml(q.explanation)}`;
    exp.classList.add('show');
  });

  await saveMyDayAnswers(dayKey, pendingAnswers, score, breakdown);

  // append summary to bottom
  const summary = document.createElement('div');
  summary.className = 'day-summary';
  summary.style.marginTop = '20px';
  summary.innerHTML = `
    <h2>${dayLabel(dayKey)} complete</h2>
    <div class="score-big">${score}</div>
    <div class="score-detail">points earned</div>
    <button id="lbBtn">View leaderboard</button>
  `;
  app.appendChild(summary);
  document.getElementById('lbBtn').addEventListener('click', () => {
    state.view = 'leaderboard';
    render();
  });
  document.getElementById('submitBtn').disabled = true;
  document.getElementById('submitBtn').textContent = 'Submitted';
  document.getElementById('progressText').textContent = `Score: ${score} points`;

  window.scrollTo({ top: summary.offsetTop - 20, behavior: 'smooth' });
}

function renderReview(dayKey) {
  const dayQuestions = QUESTIONS[dayKey];
  const a = state.answers[dayKey];
  const tabs = DAYS.map(d => {
    const isActive = d.key === dayKey;
    const isDone = !!state.answers[d.key];
    return `<div class="day-tab ${isActive ? 'active' : ''} ${isDone ? 'completed' : ''}" data-day="${d.key}">${d.label}<br><span style="font-weight:400;font-size:12px;opacity:0.8">${d.subtitle}</span></div>`;
  }).join('');

  const cards = dayQuestions.map((q, idx) => {
    const selected = a.answers[q.id];
    const correct = selected === q.correct;
    const isFM = !!q.fridayMagic;
    const optionsHtml = q.options.map((o, i) => {
      let cls = 'option disabled';
      if (i === q.correct) cls += ' correct';
      else if (i === selected) cls += ' incorrect';
      return `<div class="${cls}"><span class="option-letter">${String.fromCharCode(65+i)})</span>${escapeHtml(o)}</div>`;
    }).join('');
    return `
      <div class="question-card ${isFM ? 'friday-magic' : ''}">
        ${isFM ? '<div class="friday-magic-banner">⭐ FRIDAY MAGIC ⭐</div>' : ''}
        <div class="question-meta">
          <span>Question ${idx+1} · ${escapeHtml(q.category)}</span>
          <span class="points-badge">${correct ? q.points : 0} / ${q.points} pts</span>
        </div>
        <div class="question-text">${escapeHtml(q.text)}</div>
        <div class="options">${optionsHtml}</div>
        <div class="explanation show"><strong>${correct ? 'Correct.' : 'Not quite.'}</strong> ${escapeHtml(q.explanation)}</div>
      </div>
    `;
  }).join('');

  app.innerHTML = `
    <div class="day-tabs">${tabs}</div>
    <div>${cards}</div>
    <div class="card">
      <div class="submit-row">
        <div class="progress-text">Day score: ${a.score} points</div>
        <button id="lbBtn">View leaderboard</button>
      </div>
    </div>
  `;
  attachTabHandlers();
  document.getElementById('lbBtn').addEventListener('click', () => {
    state.view = 'leaderboard';
    render();
  });
}

function attachTabHandlers() {
  document.querySelectorAll('.day-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      state.currentDay = tab.dataset.day;
      state.view = 'playing';
      render();
    });
  });
}

async function renderLeaderboard() {
  app.innerHTML = `<div class="card"><h2>Leaderboard</h2><p>Loading…</p></div>`;
  const list = await fetchLeaderboard();

  const rows = list.length === 0
    ? `<tr><td colspan="5" style="text-align:center; padding: 24px; opacity: 0.6;">No scores yet. Be the first.</td></tr>`
    : list.map((p, idx) => {
        const isMe = p.name === state.player;
        const rankClass = idx === 0 ? 'rank top' : 'rank';
        return `
          <tr class="${isMe ? 'you' : ''}">
            <td class="${rankClass}">${idx + 1}</td>
            <td><strong>${escapeHtml(p.name)}</strong>${isMe ? ' <span style="opacity:0.6">(you)</span>' : ''}</td>
            <td class="day-cell ${p.wed !== null ? 'played' : ''}">${p.wed !== null ? p.wed : '-'}</td>
            <td class="day-cell ${p.thu !== null ? 'played' : ''}">${p.thu !== null ? p.thu : '-'}</td>
            <td class="day-cell ${p.fri !== null ? 'played' : ''}">${p.fri !== null ? p.fri : '-'}</td>
            <td class="score">${p.total}</td>
          </tr>
        `;
      }).join('');

  app.innerHTML = `
    <div class="card leaderboard">
      <h2>Leaderboard</h2>
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Player</th>
            <th style="text-align:center">Wed</th>
            <th style="text-align:center">Thu</th>
            <th style="text-align:center">Fri</th>
            <th style="text-align:right">Total</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="info-box">
        Three days. Wednesday, Thursday, Friday. Five questions each day. Friday closes with the 30-point Friday Magic question.
      </div>
      <div style="margin-top: 18px;">
        <button id="backBtn">Back to game</button>
        <button id="refreshBtn" class="secondary" style="margin-left: 8px;">Refresh</button>
        <button id="resyncBtn" class="secondary" style="margin-left: 8px;">Resync my score</button>
      </div>
      <div id="resyncStatus" style="margin-top: 12px; font-size: 13px; color: var(--charcoal); opacity: 0.7;"></div>
    </div>
  `;
  document.getElementById('backBtn').addEventListener('click', () => {
    state.view = 'playing';
    state.currentDay = pickDefaultDay();
    render();
  });
  document.getElementById('refreshBtn').addEventListener('click', () => renderLeaderboard());
  document.getElementById('resyncBtn').addEventListener('click', async () => {
    const status = document.getElementById('resyncStatus');
    status.textContent = 'Resyncing…';
    const result = await resyncMyScores();
    if (result.synced === 0 && result.errors.length === 0) {
      status.textContent = 'No local scores to resync. Play a day first.';
    } else if (result.errors.length === 0) {
      status.textContent = `Resynced ${result.synced} day(s). Refreshing…`;
      setTimeout(() => renderLeaderboard(), 600);
    } else {
      status.textContent = `Synced ${result.synced} day(s). Failed on: ${result.errors.join(', ')}. Check browser console for details.`;
    }
  });
}

function dayLabel(key) {
  return key === 'wed' ? 'Wednesday' : key === 'thu' ? 'Thursday' : 'Friday';
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

// ============================================================
// BOOT
// ============================================================
async function boot() {
  const hasPlayer = await loadPlayer();
  if (hasPlayer) {
    await loadMyAnswers();
    state.view = 'rules';
  } else {
    state.view = 'onboarding';
  }
  render();
}

boot();
</script>
